services:

  backend:
    build:
      context: ./backend

    container_name: careerpathai-backend

    ports:
      - "8080:8080"

    environment:
      AWS_REGION: ap-south-1

    volumes:
      - ${USERPROFILE}/.aws:/root/.aws:ro

    restart: unless-stopped

  frontend:
    build:
      context: ./frontend

    container_name: careerpathai-frontend

    ports:
      - "3000:80"

    depends_on:
      - backend

    restart: unless-stopped